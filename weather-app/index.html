<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>weather-app</title>        
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="main-container">
            <input class="searchbox" placeholder="enter city">
            <div class="weather-card">
                <img class="icon">
                <p class="temp"></p>
                <p class="city"></p>
                <p class="condition"></p>
            </div>
            <div class="box-container"> 
                <div class="box">
                    <h1 class="humidity">Humidity</h1>
                    <p class="humidity-value"></p>
                </div>
                <div class="box">
                    <h2 class="wind">Wind</h2>
                    <p class="wind-speed"></p>
                </div>
                <div class="box">
                    <h3 class="feels-like">Feels-Like</h3>
                    <p class="feels-like-value"></p>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
