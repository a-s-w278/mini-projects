<!DOCTYPE html>
<html>
    <head>
        <title>number guessing game</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container-grid">
            <div class="sub-container">
                <p>chances</p>
                <p id="chance">10</p>
            </div>
            <div class="sub-container">
                <p>score</p>
                <p id="score">0</p>
            </div>
        </div>
        <p class="response-text" id="response"></p>
        <div class="button-container">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
        </div>
    </body>
    <script src="script.js"></script>
</html>
